
<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <script>
      (function(){
        try {
          var v = localStorage.getItem('sa_industrial_theme_v1');
          if (v === 'false') document.documentElement.classList.remove('dark');
          else document.documentElement.classList.add('dark');
        } catch(e) { document.documentElement.classList.add('dark'); }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeção de Estoque — Só Aço Industrial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
          font-family: 'Inter', sans-serif; 
          color: #1a1a1a;
        }
        .dark body {
          color: #f1f1f1;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #808080; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #2E2D2C; }
        .dark ::-webkit-scrollbar-track { background: #2E2D2C; }
        .dark ::-webkit-scrollbar-thumb { background: #808080; }
        
        /* Cabeçalhos e Colunas Sticky - Garantir opacidade e alinhamento */
        .sticky-header { position: sticky; top: 0; z-index: 50; }
        .sticky-col { position: sticky; left: 0; z-index: 45; }
        .sticky-col-2 { position: sticky; left: 120px; z-index: 45; }
        
        /* Drag and Drop Visuals */
        .dragging { opacity: 0.5; transform: scale(0.98); cursor: grabbing; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .drop-target { border: 2px dashed #1E22AA !important; background-color: rgba(30, 34, 170, 0.05) !important; }

        /* Animação Surgir (Entrada) */
        @keyframes surgir {
          from { 
            opacity: 0; 
            transform: translateY(20px) scale(0.98); 
          }
          to { 
            opacity: 1; 
            transform: translateY(0) scale(1); 
          }
        }
        .animate-surgir {
          animation: surgir 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Animação Flutuar (Contínua) */
        @keyframes flutuar {
          0% { transform: translateY(0px); }
          50% { transform: translateY(-8px); }
          100% { transform: translateY(0px); }
        }
        .animate-flutuar {
          animation: flutuar 5s ease-in-out infinite;
        }

        /* Fullscreen: evita área preta e preenche toda a tela */
        .projection-fullscreen-container:fullscreen,
        .projection-fullscreen-container:-webkit-full-screen,
        .projection-fullscreen-container:-moz-full-screen {
          background-color: #f7f9fd !important;
          width: 100vw !important;
          height: 100vh !important;
          min-height: 100vh !important;
          max-height: 100vh !important;
          box-sizing: border-box;
          overflow: auto;
          position: fixed;
          top: 0;
          left: 0;
        }
        .dark .projection-fullscreen-container:fullscreen,
        .dark .projection-fullscreen-container:-webkit-full-screen,
        .dark .projection-fullscreen-container:-moz-full-screen {
          background-color: #1a1a1a !important;
        }

        /* Prevenindo seleção de texto em botões e headers */
        th, button { user-select: none; }

        /* Estilos de texto para modo claro */
        .text-main { color: #1a1a1a; }
        .dark .text-main { color: #f1f1f1; }

        /* Impressão: snapshot da área de projeção (filtros + tabela), preservando cores */
        @media print {
          @page {
            size: landscape;
            margin: 4mm;
          }

          html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: auto !important;
            overflow: visible !important;
            background: #1a1a1a !important;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
          }

          body * {
            visibility: hidden !important;
          }

          .projection-print-area,
          .projection-print-area * {
            visibility: visible !important;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
          }

          .projection-print-area {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            width: 100% !important;
            min-width: 0 !important;
            min-height: 0 !important;
            max-height: none !important;
            overflow: visible !important;
            margin: 0 !important;
            padding: 0 !important;
            background: #1a1a1a !important;
            box-shadow: none !important;
            border: none !important;
            zoom: 0.72;
            transform-origin: top left;
          }

          .projection-print-area .no-print {
            display: none !important;
          }

          .projection-print-area .overflow-auto,
          .projection-print-area .max-h-\[calc\(100vh-215px\)\] {
            max-height: none !important;
            overflow: visible !important;
          }

          .projection-print-area table {
            font-size: 8px !important;
            width: 100% !important;
            min-width: 0 !important;
            table-layout: fixed !important;
          }

          .projection-print-area th,
          .projection-print-area td {
            padding-top: 2px !important;
            padding-bottom: 2px !important;
            padding-left: 3px !important;
            padding-right: 3px !important;
            page-break-inside: avoid !important;
            break-inside: avoid !important;
            position: static !important;
            left: auto !important;
            box-shadow: none !important;
            min-width: 0 !important;
            width: auto !important;
          }

          /* Coluna Descrição: exibir texto completo na impressão */
          .projection-print-area .print-desc-col,
          .projection-print-area th.print-desc-col,
          .projection-print-area td.print-desc-col,
          .projection-print-area .print-desc-col * {
            overflow: visible !important;
            text-overflow: unset !important;
            white-space: normal !important;
            word-wrap: break-word !important;
          }
          .projection-print-area th.print-desc-col,
          .projection-print-area td.print-desc-col {
            min-width: 120px !important;
            width: 22% !important;
            max-width: none !important;
          }
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#041126', /* Azul marinho profundo ajustado conforme a logo */
                        secondary: '#1E22AA',
                        highlight: '#FFAD00',
                        neutral: '#808080',
                        darkBg: '#2E2D2C'
                    }
                }
            }
        }
    </script>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",

    "recharts": "https://esm.sh/recharts@^3.7.0",

    "vite": "https://esm.sh/vite@^7.3.1"
  }
}
</script>
</head>
<body class="bg-gray-50 text-main dark:bg-[#1a1a1a] dark:text-gray-100 transition-colors duration-200">

    <!-- Script de entrada para carregar a aplicação React -->

</html>
